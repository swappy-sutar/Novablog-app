<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
</head>
<body style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0c1e;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    ">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #0b0c1e;">
        <tr>
            <td align="center" style="padding: 0;">
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 580px; background-color: #0b0c1e; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 32px 24px 16px 24px;">
                            <img src="https://novablog.space/svg/novablog-lockup-dark.png" alt="NovaBlog Logo" width="160" style="display: block; border: none;" />
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 0 32px 32px 32px;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td>
                                        <h1 style="color: #ffffff; font-size: 24px; font-weight: 700; margin: 0 0 20px 0; font-family: 'Inter', system-ui, sans-serif; letter-spacing: -0.03em; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px;">
                                            {{subject}}
                                        </h1>
                                        <div class="newsletter-body" style="color: #cbd5e1; font-size: 14px; line-height: 24px; margin: 0; font-family: 'Inter', system-ui, sans-serif; text-align: left;">
                                            {{content}}
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Divider -->
                    <tr>
                        <td style="padding: 0 32px;">
                            <div style="border-top: 1px solid rgba(255, 255, 255, 0.08); height: 1px; width: 100%;"></div>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 24px 32px 32px 32px; text-align: center;">
                            <p style="color: #64748b; font-size: 12px; line-height: 18px; margin: 0 0 8px 0;">
                                &copy; 2026 NovaBlog. All rights reserved.
                            </p>
                            <p style="color: #64748b; font-size: 11px; line-height: 18px; margin: 0;">
                                You received this email because you are subscribed to the NovaBlog newsletter. 
                                <br />
                                <a href="{{unsubscribeLink}}" style="color: #8b5cf6; text-decoration: none; font-weight: 600;">Unsubscribe</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
