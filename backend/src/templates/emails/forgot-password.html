<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
</head>

<body style="
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    ">
    <div style="
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
      ">
        <h1>
            Reset Your Password 🔐
        </h1>

        <p>
            Hello {{firstname}},
        </p>

        <p>
            Click the button below to
            reset your password.
        </p>

        <a href="{{resetLink}}" style="
          display: inline-block;
          padding: 12px 24px;
          background: black;
          color: white;
          text-decoration: none;
          border-radius: 8px;
          margin-top: 20px;
        ">
            Reset Password
        </a>

        <br />
        <br />

        <p>
            If you did not request
            this, ignore this email.
        </p>
    </div>
</body>

</html>
