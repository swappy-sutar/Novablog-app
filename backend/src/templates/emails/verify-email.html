<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email</title>
</head>
<body style="
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    ">
    <div style="
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
      ">
        <h1>
            Verify Your Email ✅
        </h1>

        <p>
            Hello {{firstname}},
        </p>

        <p>
            Please verify your email
            address.
        </p>

        <a href="{{verifyLink}}" style="
          display: inline-block;
          padding: 12px 24px;
          background: green;
          color: white;
          text-decoration: none;
          border-radius: 8px;
          margin-top: 20px;
        ">
            Verify Email
        </a>
    </div>
</body>

</html>
